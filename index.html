<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bunga Mekar dengan Foto</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #0f172a; /* Warna latar belakang gelap */
            overflow: hidden;
        }

        .flower-container {
            position: relative;
            width: 300px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Foto di bagian tengah */
        .center-photo {
            position: absolute;
            width: 110px;
            height: 110px;
            border-radius: 50%;
            background-image: url('https://github.com/zahrotussita3535-ship-it/hahaha/blob/58907a0b128c974c40d6583719c7b8f52e8ecfbc/foto%20(1).png'); /* GANTI DENGAN URL FOTO KAMU */
            background-size: cover;
            background-position: center;
            border: 4px solid #fff;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.4);
            z-index: 10;
        }

        /* Kelopak Bunga */
        .petal {
            position: absolute;
            width: 70px;
            height: 130px;
            background: linear-gradient(to bottom, #ff758f, #ffb3c1); /* Gradasi warna pink */
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            box-shadow: 0px 5px 10px rgba(0,0,0,0.15);
            transform-origin: bottom center;
            bottom: 50%; /* Mulai dari titik tengah */
            opacity: 0;
            transform: scale(0) rotate(var(--i));
            animation: bloom 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            animation-delay: calc(var(--d) * 0.1s);
        }

        /* Animasi Kelopak Keluar/Mekar */
        @keyframes bloom {
            to {
                opacity: 0.9;
                transform: scale(1) rotate(var(--i)) translateY(-30px);
                /* translateY(-30px) membuat kelopak terdorong keluar dari pusat */
            }
        }
    </style>
</head>
<body>

    <div class="flower-container">
        <div class="petal" style="--i: 0deg; --d: 1;"></div>
        <div class="petal" style="--i: 30deg; --d: 2;"></div>
        <div class="petal" style="--i: 60deg; --d: 3;"></div>
        <div class="petal" style="--i: 90deg; --d: 4;"></div>
        <div class="petal" style="--i: 120deg; --d: 5;"></div>
        <div class="petal" style="--i: 150deg; --d: 6;"></div>
        <div class="petal" style="--i: 180deg; --d: 7;"></div>
        <div class="petal" style="--i: 210deg; --d: 8;"></div>
        <div class="petal" style="--i: 240deg; --d: 9;"></div>
        <div class="petal" style="--i: 270deg; --d: 10;"></div>
        <div class="petal" style="--i: 300deg; --d: 11;"></div>
        <div class="petal" style="--i: 330deg; --d: 12;"></div>
        
        <div class="https://github.com/zahrotussita3535-ship-it/hahaha/blob/58907a0b128c974c40d6583719c7b8f52e8ecfbc/foto%20(1).png"></div>
    </div>

</body>
</html>
